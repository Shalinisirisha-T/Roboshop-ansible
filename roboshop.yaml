# ansible-playbook -i localhost, -e '{"instances":["mongodb","catalogue","redis","user","cart","mysql","shipping","rabbitmq","payment","frontend"]}' -e "action=destroy" roboshop.yaml

- name: create ec2 and r53 records
  hosts: all
  connection: local

  vars:
    sg_id: "sg-06c3546d4c1ab5fcf"
    ami_id: "ami-0220d79f3f480ecf5"
    domain_name: "shalinidaws88s.online"
    env: "dev"
    action: "create"

    instances:
      - mongodb
      - catalogue

  tasks:

    ### CREATE ###

    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}-{{ env }}"
        image_id: "{{ ami_id }}"
        instance_type: "t3.micro"

        security_group: "{{ sg_id }}"

        wait: false

        tags:
          Project: "roboshop"
          Component: "{{ item }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"

      loop: "{{ instances }}"
      register: ec2_output
      when: action == "create"

    - name: print output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
      when: action == "create"

    - name: create route53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        wait: false
        overwrite: true

      loop: "{{ ec2_output.results }}"
      when: action == "create"

    - name: create frontend record
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        wait: false
        overwrite: true

      loop: "{{ ec2_output.results }}"
      when:
        - item.item == "frontend"
        - action == "create"

    ### DESTROY ###

    - name: delete frontend record
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "roboshop-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1

      loop: "{{ instances }}"
      when:
        - item == "frontend"
        - action == "destroy"

    - name: delete route53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}-{{ env }}.{{ domain_name }}"
        type: A
        ttl: 1

      loop: "{{ instances }}"
      when: action == "destroy"

    - name: delete ec2 instances
      amazon.aws.ec2_instance:
        state: absent
        name: "{{ item }}-{{ env }}"
        wait: false

      loop: "{{ instances }}"
      when: action == "destroy"